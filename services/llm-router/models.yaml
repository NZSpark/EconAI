# LLM Router Model Registry Configuration
# Hot-reloadable: the service watches this file and reloads on changes.

models:
  - id: "auto"
    provider: "auto"
    type: "auto"
    description: "auto-routing based on sensitivity"
    capabilities:
      - chat
      - tool_use

  - id: "claude-sonnet-4-6"
    provider: "anthropic"
    type: "cloud"
    description: "Anthropic Claude Sonnet 4.6"
    capabilities:
      - chat
      - tool_use
      - streaming

  - id: "claude-opus-4-7"
    provider: "anthropic"
    type: "cloud"
    description: "Anthropic Claude Opus 4.7"
    capabilities:
      - chat
      - tool_use
      - streaming

  - id: "local:qwen2.5-coder:7b"
    provider: "ollama"
    type: "local"
    description: "Qwen2.5-Coder 7B via Ollama"
    capabilities:
      - chat
      - tool_use
      - streaming

default_local: "local:qwen2.5-coder:7b"
default_cloud: "claude-sonnet-4-6"