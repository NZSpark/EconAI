# =============================================================================
# EconAI Nginx Reverse Proxy Configuration
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for"'
    '}';

    access_log /var/log/nginx/access.log json;

    # -----------------------------------------------------------------------
    # Basic Settings
    # -----------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;          # don't leak nginx version

    # -----------------------------------------------------------------------
    # Gzip Compression
    # -----------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # -----------------------------------------------------------------------
    # Upload Limits
    # -----------------------------------------------------------------------
    client_max_body_size  100m;
    client_body_timeout   300s;
    client_header_timeout 60s;

    # -----------------------------------------------------------------------
    # Rate Limiting Zones
    # -----------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

    # -----------------------------------------------------------------------
    # Proxy Settings
    # -----------------------------------------------------------------------
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Request-ID      $request_id;
    proxy_set_header        Connection        "";
    proxy_buffering         off;
    proxy_read_timeout      300s;
    proxy_connect_timeout   10s;
    proxy_send_timeout      300s;

    # -----------------------------------------------------------------------
    # Upstream: API Gateway
    # -----------------------------------------------------------------------
    upstream api_gateway {
        server api-gateway:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # HTTP Server
    # -----------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Health check (no rate limiting)
        location /health {
            proxy_pass http://api_gateway;
        }

        # API Gateway — all API traffic
        location / {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://api_gateway;
        }

        # Upload endpoint — stricter rate limiting
        location ~ ^/api/projects/[^/]+/documents/upload$ {
            limit_req zone=upload_limit burst=5 nodelay;
            proxy_pass http://api_gateway;
        }
    }

    # -----------------------------------------------------------------------
    # HTTPS Server (TLS 1.2+)
    # -----------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/ssl/server.crt;
