maxmemory 2gb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots
save 900 1
save 300 10
save 60 10000

# Network
timeout 300
tcp-keepalive 60

# Key namespaces (documented, enforced via naming conventions):
#   ratelimit:*       — API rate limiter token buckets
#   token:blacklist:* — JWT token blacklist entries (TTL = remaining validity)
#   kb:index:*        — Knowledge base indexing events (pub/sub)
#   audit:log         — Audit log event channel (pub/sub)
#   celery:*          — Celery broker keys (managed by Celery)