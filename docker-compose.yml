# =============================================================================
# EconAI Docker Compose - All Services
# =============================================================================

x-common-service: &common-service
  restart: unless-stopped
  networks:
    - econai-network

x-microservice: &microservice
  <<: *common-service
  build:
    context: .
    dockerfile: ${SERVICE_DOCKERFILE:-Dockerfile}
  environment:
    - DEBUG=${DEBUG:-false}
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
    - POSTGRES_PORT=${POSTGRES_PORT:-5432}
    - POSTGRES_DB=${POSTGRES_DB:-econai}
    - POSTGRES_USER=${POSTGRES_USER:-econai}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-econai_secret_change_me}
    - REDIS_HOST=${REDIS_HOST:-redis}
    - REDIS_PORT=${REDIS_PORT:-6379}
    - REDIS_PASSWORD=${REDIS_PASSWORD:-econai_redis_change_me}
    - JWT_SECRET=${JWT_SECRET:-econai_jwt_secret_change_me_min_32_chars}
    - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}

services:
  # ===========================================================================
  # Infrastructure Services
  # ===========================================================================

  postgres:
    <<: *common-service
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: econai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-econai}
      POSTGRES_USER: ${POSTGRES_USER:-econai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-econai_secret_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-econai} -d ${POSTGRES_DB:-econai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    <<: *common-service
    image: redis:${REDIS_VERSION:-7}-alpine
    container_name: econai-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-econai_redis_change_me}
      --maxmemory ${REDIS_MAXMEMORY:-2gb}
      --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
      --appendonly yes
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-econai_redis_change_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  milvus:
    <<: *common-service
    image: milvusdb/milvus:v2.4.0
    container_name: econai-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  etcd:
    <<: *common-service
    image: quay.io/coreos/etcd:v3.5.5
    container_name: econai-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  minio:
    <<: *common-service
    image: minio/minio:latest
    container_name: econai-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
      - ./minio/init:/init:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MinIO client to create buckets on startup
  minio-init:
    image: minio/mc:latest
    restart: "no"
    networks:
      - econai-network
    container_name: econai-minio-init
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}; do
        echo 'Waiting for MinIO...';
        sleep 3;
      done;
      mc mb --ignore-existing local/${MINIO_DOCUMENT_BUCKET:-econai-documents};
      mc mb --ignore-existing local/${MINIO_OUTPUT_BUCKET:-econai-outputs};
      mc policy set download local/${MINIO_DOCUMENT_BUCKET:-econai-documents};
      mc policy set download local/${MINIO_OUTPUT_BUCKET:-econai-outputs};
      mc ilm add --expiry-days 7 local/${MINIO_DOCUMENT_BUCKET:-econai-documents}/tmp/;
      echo 'MinIO buckets initialized.';
      exit 0;
      "
    depends_on:
      minio:
        condition: service_healthy

  # ===========================================================================
  # API Gateway & Microservices
  # ===========================================================================

  api-gateway:
    <<: *microservice
    container_name: econai-api-gateway
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
      args:
        SERVICE_DIR: api-gateway
    environment:
      - API_GATEWAY_HOST=${API_GATEWAY_HOST:-0.0.0.0}
      - API_GATEWAY_PORT=${API_GATEWAY_PORT:-8000}
      - API_GATEWAY_JWT_ACCESS_EXPIRE_MINUTES=${JWT_ACCESS_EXPIRE_MINUTES:-120}
      - API_GATEWAY_JWT_REFRESH_EXPIRE_HOURS=${JWT_REFRESH_EXPIRE_HOURS:-24}
      - API_GATEWAY_JWT_SECRET=${JWT_SECRET:-econai_jwt_secret_change_me_min_32_chars}
      - API_GATEWAY_JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - CORS_ORIGINS=${CORS_ORIGINS:-[\"*\"]}
      - AUDIT_LOG_ENABLED=${AUDIT_LOG_ENABLED:-true}
      - RATE_LIMIT_PER_USER=${RATE_LIMIT_PER_USER:-100}
      - RATE_LIMIT_PER_IP=${RATE_LIMIT_PER_IP:-300}
      - RATE_LIMIT_UPLOAD=${RATE_LIMIT_UPLOAD:-20}
      - RATE_LIMIT_TASK_CREATE=${RATE_LIMIT_TASK_CREATE:-10}
      - USER_SERVICE_URL=http://user-service:8007
      - DOCUMENT_SERVICE_URL=http://document-service:8001
      - KB_SERVICE_URL=http://kb-service:8002
      - ORCHESTRATION_SERVICE_URL=http://orchestration-service:8003
      - OUTPUT_SERVICE_URL=http://output-service:8006
      - API_GATEWAY_REDIS_URL=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  document-service:
    <<: *microservice
    container_name: econai-document-service
    build:
      context: .
      dockerfile: ./services/document-service/Dockerfile
      args:
        SERVICE_DIR: services/document-service
    environment:
      - DOCUMENT_SERVICE_HOST=${DOCUMENT_SERVICE_HOST:-0.0.0.0}
      - DOCUMENT_SERVICE_PORT=${DOCUMENT_SERVICE_PORT:-8001}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-econai}:${POSTGRES_PASSWORD:-econai_secret_change_me}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-econai}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-econai_access_key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-econai_secret_key_change_me}
      - MINIO_BUCKET=${MINIO_DOCUMENT_BUCKET:-econai-documents}
      - CHUNK_PARAGRAPH_TARGET_TOKENS=${CHUNK_PARAGRAPH_TARGET_TOKENS:-300}
      - CHUNK_PARAGRAPH_MIN_TOKENS=${CHUNK_PARAGRAPH_MIN_TOKENS:-100}
      - CHUNK_PARAGRAPH_MAX_TOKENS=${CHUNK_PARAGRAPH_MAX_TOKENS:-500}
      - CHUNK_SECTION_TARGET_TOKENS=${CHUNK_SECTION_TARGET_TOKENS:-2000}
      - CHUNK_SECTION_MIN_TOKENS=${CHUNK_SECTION_MIN_TOKENS:-500}
      - CHUNK_SECTION_MAX_TOKENS=${CHUNK_SECTION_MAX_TOKENS:-3000}
      - CHUNK_PARAGRAPH_OVERLAP=${CHUNK_PARAGRAPH_OVERLAP:-50}
      - CHUNK_SECTION_OVERLAP=${CHUNK_SECTION_OVERLAP:-100}
      - OCR_LANGUAGE=${OCR_LANGUAGE:-chi_sim+eng}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-100}
      - KB_SERVICE_URL=http://kb-service:8002
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@redis:6379/1
    ports:
      - "${DOCUMENT_SERVICE_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  kb-service:
    <<: *microservice
    container_name: econai-kb-service
    build:
      context: .
      dockerfile: ./services/kb-service/Dockerfile
      args:
        SERVICE_DIR: services/kb-service
    environment:
      - KB_SERVICE_HOST=${KB_SERVICE_HOST:-0.0.0.0}
      - KB_SERVICE_PORT=${KB_SERVICE_PORT:-8002}
      - KB_DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-econai}:${POSTGRES_PASSWORD:-econai_secret_change_me}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-econai}
      - KB_REDIS_URL=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      - KB_LLM_ROUTER_URL=http://llm-router:8004
      - KB_VECTOR_DB_TYPE=${VECTOR_DB_TYPE:-milvus}
      - KB_VECTOR_DB_HOST=${VECTOR_DB_HOST:-milvus}
      - KB_VECTOR_DB_PORT=${VECTOR_DB_PORT:-19530}
      - KB_EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - KB_EMBEDDING_DIM=${EMBEDDING_DIM:-768}
      - KB_HYBRID_VECTOR_TOP_K=${HYBRID_VECTOR_TOP_K:-50}
      - KB_HYBRID_BM25_TOP_K=${HYBRID_BM25_TOP_K:-50}
      - KB_HYBRID_RRF_K=${HYBRID_RRF_K:-60}
      - KB_HYBRID_MERGED_TOP_K=${HYBRID_MERGED_TOP_K:-30}
      - KB_RERANKER_ENABLED=${RERANKER_ENABLED:-false}
      - KB_SEARCH_DEFAULT_TOP_K=${SEARCH_DEFAULT_TOP_K:-10}
      - KB_SEARCH_TIMEOUT_MS=${SEARCH_TIMEOUT_MS:-5000}
    ports:
      - "${KB_SERVICE_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      llm-router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  orchestration-service:
    <<: *microservice
    container_name: econai-orchestration-service
    build:
      context: .
      dockerfile: ./services/orchestration-service/Dockerfile
      args:
        SERVICE_DIR: services/orchestration-service
    environment:
      - ORCHESTRATION_SERVICE_HOST=${ORCHESTRATION_SERVICE_HOST:-0.0.0.0}
      - ORCHESTRATION_SERVICE_PORT=${ORCHESTRATION_SERVICE_PORT:-8003}
      - AGENT_MAX_ITERATIONS=${AGENT_MAX_ITERATIONS:-5}
      - AGENT_TOOL_TIMEOUT_S=${AGENT_TOOL_TIMEOUT_S:-60}
      - AGENT_MAX_RETRIEVED_CHUNKS=${AGENT_MAX_RETRIEVED_CHUNKS:-30}
      - TASK_TIMEOUT_MINUTES=${TASK_TIMEOUT_MINUTES:-30}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@redis:6379/1
      - ORCH_KB_SERVICE_URL=http://kb-service:8002
      - ORCH_LLM_ROUTER_URL=http://llm-router:8004
      - ORCH_CITATION_SERVICE_URL=http://citation-service:8005
      - ORCH_OUTPUT_SERVICE_URL=http://output-service:8006
      - API_GATEWAY_REDIS_URL=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
      - ORCH_PROMPT_TEMPLATES_DIR=${PROMPT_TEMPLATES_DIR:-templates/prompts}
    ports:
      - "${ORCHESTRATION_SERVICE_PORT:-8003}:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kb-service:
        condition: service_healthy
      llm-router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  llm-router:
    <<: *microservice
    container_name: econai-llm-router
    build:
      context: .
      dockerfile: ./services/llm-router/Dockerfile
      args:
        SERVICE_DIR: services/llm-router
    environment:
      - LLM_ROUTER_HOST=${LLM_ROUTER_HOST:-0.0.0.0}
      - LLM_ROUTER_PORT=${LLM_ROUTER_PORT:-8004}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LOCAL_LLM_ENDPOINT=${LOCAL_LLM_ENDPOINT:-http://host.docker.internal:11434/v1}
      - LOCAL_LLM_DEFAULT_MODEL=${LOCAL_LLM_DEFAULT_MODEL:-qwen3-72b}
      - CLOUD_LLM_DEFAULT_MODEL=${CLOUD_LLM_DEFAULT_MODEL:-claude-sonnet-4-6}
      - LLM_DEFAULT_TEMPERATURE=${LLM_DEFAULT_TEMPERATURE:-0.3}
      - LLM_DEFAULT_MAX_TOKENS=${LLM_DEFAULT_MAX_TOKENS:-4096}
      - LLM_REQUEST_TIMEOUT_S=${LLM_REQUEST_TIMEOUT_S:-120}
      - LLM_RETRY_MAX=${LLM_RETRY_MAX:-3}
      - LLM_RETRY_BACKOFF_BASE_S=${LLM_RETRY_BACKOFF_BASE_S:-2}
    ports:
      - "${LLM_ROUTER_PORT:-8004}:8004"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  citation-service:
    <<: *microservice
    container_name: econai-citation-service
    build:
      context: .
      dockerfile: ./services/citation-service/Dockerfile
      args:
        SERVICE_DIR: services/citation-service
    environment:
      - CITATION_SERVICE_HOST=${CITATION_SERVICE_HOST:-0.0.0.0}
      - CITATION_SERVICE_PORT=${CITATION_SERVICE_PORT:-8005}
      - CITATION_SIMILARITY_THRESHOLD=${CITATION_SIMILARITY_THRESHOLD:-0.85}
      - CITATION_VERIFY_BATCH_SIZE=${CITATION_VERIFY_BATCH_SIZE:-50}
      - CITATION_FORMAT_FOOTNOTE=${CITATION_FORMAT_FOOTNOTE:-true}
    ports:
      - "${CITATION_SERVICE_PORT:-8005}:8005"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  output-service:
    <<: *microservice
    container_name: econai-output-service
    build:
      context: .
      dockerfile: ./services/output-service/Dockerfile
      args:
        SERVICE_DIR: services/output-service
    environment:
      - OUTPUT_SERVICE_HOST=${OUTPUT_SERVICE_HOST:-0.0.0.0}
      - OUTPUT_SERVICE_PORT=${OUTPUT_SERVICE_PORT:-8006}
      - OUTPUT_STORAGE_PATH=${OUTPUT_STORAGE_PATH:-outputs/}
      - OUTPUT_TEMPLATES_DIR=${OUTPUT_TEMPLATES_DIR:-templates/output/}
      - DOCX_INSTITUTION_NAME=${DOCX_INSTITUTION_NAME:-EconAI Institution}
      - DOCX_DEFAULT_FONT=${DOCX_DEFAULT_FONT:-仿宋_GB2312}
      - PPTX_DEFAULT_THEME=${PPTX_DEFAULT_THEME:-default}
      - OUTPUT_MAX_FILE_SIZE_MB=${OUTPUT_MAX_FILE_SIZE_MB:-50}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-econai_access_key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-econai_secret_key_change_me}
      - MINIO_OUTPUT_BUCKET=${MINIO_OUTPUT_BUCKET:-econai-outputs}
    ports:
      - "${OUTPUT_SERVICE_PORT:-8006}:8006"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  user-service:
    <<: *microservice
    container_name: econai-user-service
    build:
      context: .
      dockerfile: ./services/user-service/Dockerfile
      args:
        SERVICE_DIR: services/user-service
    environment:
      - USER_SERVICE_HOST=${USER_SERVICE_HOST:-0.0.0.0}
      - USER_SERVICE_PORT=${USER_SERVICE_PORT:-8007}
      - USER_SERVICE_JWT_SECRET=${JWT_SECRET:-econai_jwt_secret_change_me_min_32_chars}
      - USER_SERVICE_JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - USER_SERVICE_JWT_ACCESS_EXPIRE_MINUTES=${JWT_ACCESS_EXPIRE_MINUTES:-120}
      - USER_SERVICE_JWT_REFRESH_EXPIRE_HOURS=${JWT_REFRESH_EXPIRE_HOURS:-24}
      - LDAP_ENABLED=${LDAP_ENABLED:-false}
      - LDAP_SERVER=${LDAP_SERVER:-ldap://localhost:389}
      - LDAP_BASE_DN=${LDAP_BASE_DN:-dc=institution,dc=cn}
      - LDAP_USER_FILTER=${LDAP_USER_FILTER:-(uid=%(username)s)}
      - AUDIT_LOG_RETENTION_MONTHS=${AUDIT_LOG_RETENTION_MONTHS:-6}
      - TOKEN_BLACKLIST_ENABLED=${TOKEN_BLACKLIST_ENABLED:-true}
      - USER_SERVICE_POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - USER_SERVICE_POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - USER_SERVICE_POSTGRES_DB=${POSTGRES_DB:-econai}
      - USER_SERVICE_POSTGRES_USER=${POSTGRES_USER:-econai}
      - USER_SERVICE_POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-econai_secret_change_me}
      - USER_SERVICE_REDIS_HOST=${REDIS_HOST:-redis}
      - USER_SERVICE_REDIS_PORT=${REDIS_PORT:-6379}
      - USER_SERVICE_REDIS_PASSWORD=${REDIS_PASSWORD:-econai_redis_change_me}
    ports:
      - "${USER_SERVICE_PORT:-8007}:8007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8007/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ===========================================================================
  # Celery Workers
  # ===========================================================================

  celery-worker-document:
    <<: *microservice
    container_name: econai-celery-document
    build:
      context: .
      dockerfile: ./services/document-service/Dockerfile
      args:
        SERVICE_DIR: services/document-service
    command: >
      celery -A document_service.celery_app:celery_app worker
      --loglevel=${LOG_LEVEL:-INFO}
      --concurrency=2
      --max-memory-per-child=${CELERY_WORKER_MAX_MEMORY_PER_CHILD:-512000}
      --queues=${CELERY_DOCUMENT_QUEUE:-document}
      --hostname=document-worker@%h
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@redis:6379/1
      - CELERY_TASK_TIME_LIMIT=${CELERY_TASK_TIME_LIMIT:-1800}
      - CELERY_TASK_SOFT_TIME_LIMIT=${CELERY_TASK_SOFT_TIME_LIMIT:-1500}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-econai}:${POSTGRES_PASSWORD:-econai_secret_change_me}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-econai}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-econai_access_key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-econai_secret_key_change_me}
      - MINIO_BUCKET=${MINIO_DOCUMENT_BUCKET:-econai-documents}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "celery -A document_service.celery_app:celery_app status -t 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-worker-orchestration:
    <<: *microservice
    container_name: econai-celery-orchestration
    build:
      context: .
      dockerfile: ./services/orchestration-service/Dockerfile
      args:
        SERVICE_DIR: services/orchestration-service
    command: >
      celery -A orchestration_service.worker:app worker
      --loglevel=${LOG_LEVEL:-INFO}
      --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
      --max-memory-per-child=${CELERY_WORKER_MAX_MEMORY_PER_CHILD:-512000}
      --queues=${CELERY_ORCHESTRATION_QUEUE:-orchestration}
      --hostname=orchestration-worker@%h
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@redis:6379/1
      - CELERY_TASK_TIME_LIMIT=${CELERY_TASK_TIME_LIMIT:-1800}
      - CELERY_TASK_SOFT_TIME_LIMIT=${CELERY_TASK_SOFT_TIME_LIMIT:-1500}
      - ORCH_KB_SERVICE_URL=http://kb-service:8002
      - ORCH_LLM_ROUTER_URL=http://llm-router:8004
      - ORCH_CITATION_SERVICE_URL=http://citation-service:8005
      - ORCH_OUTPUT_SERVICE_URL=http://output-service:8006
      - API_GATEWAY_REDIS_URL=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
      - PROMPT_TEMPLATES_DIR=${PROMPT_TEMPLATES_DIR:-templates/prompts}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-econai}
      - POSTGRES_USER=${POSTGRES_USER:-econai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-econai_secret_change_me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A orchestration_service.worker:app status -t 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery-beat:
    <<: *microservice
    container_name: econai-celery-beat
    build:
      context: .
      dockerfile: ./services/orchestration-service/Dockerfile
      args:
        SERVICE_DIR: services/orchestration-service
    command: >
      celery -A orchestration_service.worker:app beat
      --loglevel=${LOG_LEVEL:-INFO}
      --schedule=/var/run/celery/celerybeat-schedule
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-econai_redis_change_me}@redis:6379/1
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-econai}
      - POSTGRES_USER=${POSTGRES_USER:-econai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-econai_secret_change_me}
    volumes:
      - celery-beat-data:/var/run/celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A orchestration_service.worker:app status -t 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # Reverse Proxy
  # ===========================================================================

  nginx:
    <<: *common-service
    image: nginx:alpine
    container_name: econai-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Monitoring
  # ===========================================================================

  prometheus:
    <<: *common-service
    image: prom/prometheus:latest
    container_name: econai-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      api-gateway:
        condition: service_healthy

  grafana:
    <<: *common-service
    image: grafana/grafana:latest
    container_name: econai-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_change_me}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

# =============================================================================
# Networks
# =============================================================================

networks:
  econai-network:
    driver: bridge
    name: econai-network

# =============================================================================
# Volumes
# =============================================================================

volumes:
  postgres-data:
    name: econai-postgres-data
  redis-data:
    name: econai-redis-data
  milvus-data:
    name: econai-milvus-data
  etcd-data:
    name: econai-etcd-data
  minio-data:
    name: econai-minio-data
  prometheus-data:
    name: econai-prometheus-data
  grafana-data:
    name: econai-grafana-data
  celery-beat-data:
    name: econai-celery-beat-data